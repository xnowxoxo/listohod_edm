version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stemacademia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stemacademia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stemacademia_secret}
      POSTGRES_DB: ${POSTGRES_DB:-stemacademia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5450:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stemacademia}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stemacademia_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stemacademia}:${POSTGRES_PASSWORD:-stemacademia_secret}@postgres:5432/${POSTGRES_DB:-stemacademia}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Email / SMTP — leave empty in .env to use dev mode (tokens logged to console)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Storage: 'local' (default) or 's3'
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      # S3-compatible storage (set STORAGE_DRIVER=s3 and fill these to enable)
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-auto}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: stemacademia_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  uploads_data:
